version: "3.9"

services:
  nginx:
    image: mkourany/nginx:prod
    build:
      context: ../nginx
      dockerfile: Dockerfile
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cpus: 0.25
    mem_limit: 64m   

  frontend:
    image: mkourany/frontend:prod
    build:
      context: ../frontend
    networks:
      - frontend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    cpus: 0.25
    mem_limit: 128m

  backend:
    image: mkourany/backend:prod
    build:
      context: ../backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
    ports:
      - "${BACKEND_PORT:-3000}:3000" # optional in strict prod; prefer routing via nginx
    depends_on:
      - mysql
    networks:
      - backend-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    secrets:
      - mysql_password
    cpus: 0.50
    mem_limit: 256m

  mysql:
    image: mysql:8.0.34
    container_name: mkourany_mysql
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -pmysql_root || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    secrets:
      - mysql_root_password
      - mysql_password
    cpus: 0.50
    mem_limit: 512m  

  cadvisor:
    image: gcr.io/google-containers/cadvisor:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring-net
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring-net
    restart: unless-stopped
    logging:
      driver: "json-file"
    cpus: 0.25
    mem_limit: 256m

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    cpus: 0.25
    mem_limit: 256m  

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  grafana_data:
    driver: local

secrets:
  mysql_root_password:
    file: ../secrets/mysql_root_password.txt
  mysql_password:
    file: ../secrets/mysql_password.txt