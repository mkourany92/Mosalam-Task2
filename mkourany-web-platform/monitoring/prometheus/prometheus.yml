global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'docker'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:9323']  # optional node-exporter / dockerd metrics if you expose them
